services:
  fastapi:
    image: ${FASTAPI_IMAGE:-batik-fastapi:local}
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: "host"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ${BATIK_MODELS_DIR:-/opt/models}:/app/models:ro
      - ${BATIK_CHECKPOINTS_DIR:-/opt/checkpoints}:/app/checkpoints:ro
      - ${BATIK_DATA_DIR:-/opt/data}:/app/data:ro
    environment:
      PORT: 8000
      BATIK_MODELS_DIR: ${BATIK_MODELS_DIR:-/opt/models}
      BATIK_CHECKPOINTS_DIR: ${BATIK_CHECKPOINTS_DIR:-/opt/checkpoints}
      BATIK_DATA_DIR: ${BATIK_DATA_DIR:-/opt/data}
