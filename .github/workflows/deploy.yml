name: batik-fastapi

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'penelitian-batik-malang/batik-fastapi' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters and test tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Run tests when available
        shell: bash
        run: |
          if [ -d tests ] || [ -d test ]; then
            pytest
          else
            echo "No tests directory found; skipping pytest."
          fi

  build:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize IMAGE_NAME to lowercase
        run: |
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME_LOWER=${IMAGE_NAME_LOWER}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_PATH: /opt/app/fastapi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize IMAGE_NAME for deploy
        run: |
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME_LOWER=${IMAGE_NAME_LOWER}" >> $GITHUB_ENV

      - name: Prepare .env file
        run: |
          cat > .env <<EOF
          FASTAPI_IMAGE=${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}:${{ github.sha }}
          BATIK_MODELS_DIR=/opt/models
          BATIK_CHECKPOINTS_DIR=/opt/checkpoints
          BATIK_DATA_DIR=/opt/data
          PORT=8000
          DEBUG=false
          APP_VERSION=1.0.0
          BATIK_SEARCH_FEATURE_EXTRACTOR_WEIGHTS=/app/models/convnext_feature_extractor.pt
          EOF

          # Timpa dengan ENV_PROD jika ada (override semua nilai di atas)
          if [ -n "${{ secrets.ENV_PROD }}" ]; then
            printf '%s' "${{ secrets.ENV_PROD }}" > .env
            # Pastikan FASTAPI_IMAGE tetap pakai tag commit terbaru
            sed -i "s|^FASTAPI_IMAGE=.*|FASTAPI_IMAGE=${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}:${{ github.sha }}|" .env
          fi

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          overwrite: true
          source: "docker-compose.yml,.env"
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # Pastikan network ada
            docker network inspect batik_network >/dev/null 2>&1 \
              || docker network create batik_network

            # Login ke GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Pull image terbaru
            docker compose pull fastapi

            # Jalankan container
            docker compose up -d --no-build --remove-orphans

            # Health check dengan retry
            echo "Waiting for FastAPI to be ready..."
            sleep 5
            curl --fail --retry 10 --retry-delay 3 \
              http://127.0.0.1:8000/health || {
              echo "❌ Health check failed"
              docker compose logs fastapi --tail 50
              exit 1
            }

            # Cleanup image lama
            docker image prune -f

            echo "✅ Deployment successful: ${{ github.sha }}"
