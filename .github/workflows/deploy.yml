name: batik-fastapi

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository || 'batik-fastapi' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters and test tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Run tests when available
        shell: bash
        run: |
          if [ -d tests ] || [ -d test ]; then
            pytest
          else
            echo "No tests directory found; skipping pytest."
          fi

  build:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize IMAGE_NAME to lowercase
        run: |
          IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME_LOWER=${IMAGE_NAME_LOWER}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /opt/app/fastapi
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize IMAGE_NAME for deploy
        run: |
          IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')
          echo "FASTAPI_IMAGE=${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Prepare deployment env file
        env:
          FASTAPI_IMAGE_VAL: ${{ env.FASTAPI_IMAGE }}
        run: |
          if [ -n "${{ secrets.ENV_PROD }}" ]; then
            printf '%s' "${{ secrets.ENV_PROD }}" > .env
          else
            echo "FASTAPI_IMAGE=${FASTAPI_IMAGE_VAL}" > .env
            echo "BATIK_MODELS_DIR=/opt/models" >> .env
            echo "BATIK_CHECKPOINTS_DIR=/opt/checkpoints" >> .env
            echo "BATIK_DATA_DIR=/opt/data" >> .env
            echo "PORT=8000" >> .env
          fi

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: "docker-compose.yml,.env"
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # Ensure network exists
            docker network inspect batik_network >/dev/null 2>&1 || docker network create batik_network

            # Pull and deploy
            docker compose pull fastapi
            docker compose up -d --no-build --remove-orphans

            # Health check with retry
            sleep 5
            curl --fail --retry 10 --retry-delay 3 http://127.0.0.1:8000/health || {
              echo "Health check failed"
              docker compose logs fastapi
              exit 1
            }

            echo "✅ Deployment successful"
