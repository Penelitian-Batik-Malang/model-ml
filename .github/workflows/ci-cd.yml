name: FastAPI CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: penelitian-batik-malang/model-ml
  IMAGE_TAG: ghcr.io/penelitian-batik-malang/model-ml:main
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.dev.txt

      # - name: Lint with ruff
      #   run: ruff check app/ main.py

      # - name: Run pytest
      #   run: pytest tests/ -v --tb=short -x
      #   env:
      #     SKIP_INTEGRATION_TESTS: "true"

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
      VPS_SSH_PASSPHRASE: ${{ secrets.VPS_SSH_PASSPHRASE }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      ENV_PROD: ${{ secrets.ENV_PROD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          if [ -n "$VPS_SSH_PASSPHRASE" ]; then
            ssh-keygen -p -P "$VPS_SSH_PASSPHRASE" -N "" -f ~/.ssh/id_rsa
          fi
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Prepare production env file
        run: |
          printf '%s\n' "$ENV_PROD" > /tmp/.env.prod
          printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG" >> /tmp/.env.prod

      - name: Copy docker-compose.yml to VPS
        run: |
          if [ -f docker-compose.yml ]; then
            ssh -i ~/.ssh/id_rsa -p "$VPS_SSH_PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$DEPLOY_PATH'"
            scp -i ~/.ssh/id_rsa -P "$VPS_SSH_PORT" docker-compose.yml "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/docker-compose.yml"
          fi

          ssh -i ~/.ssh/id_rsa -p "$VPS_SSH_PORT" "$VPS_USER@$VPS_HOST" "test -f '$DEPLOY_PATH/docker-compose.yml'"

      - name: Copy production env to VPS
        run: |
          scp -i ~/.ssh/id_rsa -P "$VPS_SSH_PORT" /tmp/.env.prod "$VPS_USER@$VPS_HOST:$DEPLOY_PATH/.env.prod"

      - name: Login to GHCR on VPS
        run: |
          ssh -i ~/.ssh/id_rsa -p "$VPS_SSH_PORT" "$VPS_USER@$VPS_HOST" \
            "echo '$GHCR_TOKEN' | docker login ghcr.io -u '${{ github.repository_owner }}' --password-stdin"

      - name: Deploy with docker-compose
        run: |
          ssh -i ~/.ssh/id_rsa -p "$VPS_SSH_PORT" "$VPS_USER@$VPS_HOST" << EOF
          set -e
          cd "$DEPLOY_PATH"
          docker network create batik_network 2>/dev/null || true
          docker compose --env-file .env.prod pull
          docker compose --env-file .env.prod up -d --remove-orphans

          PORT=\$(grep -E '^PORT=' .env.prod | cut -d= -f2 | tr -d '\r' || true)
          PORT=\${PORT:-8000}

          for attempt in {1..30}; do
            status=\$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:\${PORT}/api/health" || true)
            if [ "\${status}" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 5
          done

          echo "Health check failed"
          docker compose --env-file .env.prod ps || true
          docker logs --tail 200 batik_fastapi || true
          exit 1
          EOF
